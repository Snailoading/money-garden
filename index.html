  <title>Money Garden</title>
  <script>
    // Stamp the theme before first paint so there's no flash of the wrong
    // garden. Mirrors resolveTheme() in src/ui/theme.ts; the direct
    // localStorage read is a documented exception to the storage-adapter
    // rule — this runs before the app (and its adapter) exists.
    (function () {
      try {
        var mode = localStorage.getItem("money-garden:theme") || "auto";
        var h = new Date().getHours();
        var night = mode === "night" || (mode === "auto" && (h < 7 || h >= 19));
        document.documentElement.dataset.theme = night ? "night" : "day";
      } catch (e) { /* storage unavailable → day */ }
    })();
  </script>
